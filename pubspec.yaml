name: fitforge
description: App de entrenamiento tipo Fitbod con IA, rutinas y progreso en la nube.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase & Auth
  supabase_flutter: ^2.8.0
  cloudflare_turnstile: ^3.7.1
  google_sign_in: ^6.2.2

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  lottie: ^3.3.1

  # Utils
  http: ^1.2.2
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  audioplayers: ^6.7.1
  path: ^1.9.1
  path_provider: ^2.1.5
  mobile_scanner: 7.0.1
  image_picker: ^1.1.2
  permission_handler: ^11.4.0

  # Push notifications (FCM)
  firebase_core: ^3.13.0
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^19.0.0
  timezone: ^0.10.1
  flutter_body_heatmap: ^0.1.0
  vibration: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  pdf: ^3.11.3

dependency_overrides:
  flutter_inappwebview: 6.2.0-beta.3
  flutter_inappwebview_android: 1.2.0-beta.3
  # Built-in Kotlin fix merged in PR #1991; remove when audioplayers_android >5.2.1 ships on pub.dev.
  audioplayers_android:
    git:
      url: https://github.com/bluefireteam/audioplayers.git
      path: packages/audioplayers_android
      ref: 687218b96682a7bcadd9490572db692dbc9a2f07

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/player_levels/
    - assets/images/player_levels/transparent/
    - assets/images/milestones/
    - assets/images/milestones/transparent/
    - assets/images/avatars/
    - assets/sounds/
    - assets/animations/
    - assets/docs/
    - assets/data/
    - assets/exercises/
