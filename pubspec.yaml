name: fitforge
description: App de entrenamiento tipo Fitbod con IA, rutinas y progreso en la nube.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase & Auth
  supabase_flutter: ^2.8.0

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utils
  http: ^1.2.2
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
