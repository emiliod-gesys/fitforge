name: fitforge
description: App de entrenamiento tipo Fitbod con IA, rutinas y progreso en la nube.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Supabase & Auth
  supabase_flutter: ^2.8.0
  cloudflare_turnstile: ^3.7.1

  # State & routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # UI
  google_fonts: ^6.2.1
  fl_chart: ^0.69.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2

  # Utils
  http: ^1.2.2
  intl: ^0.20.2
  uuid: ^4.5.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3
  url_launcher: ^6.3.1
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  flutter_inappwebview: 6.2.0-beta.3
  flutter_inappwebview_android: 1.2.0-beta.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/app_icon.png
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/sounds/
