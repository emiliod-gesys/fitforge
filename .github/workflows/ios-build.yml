name: iOS Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'cursor/**'
    paths:
      - '.github/workflows/ios-build.yml'
      - 'ios/**'
      - 'lib/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'assets/**'

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.4'
          channel: stable
          cache: true

      - name: Create dart_defines.json
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}
          TURNSTILE_BASE_URL: ${{ secrets.TURNSTILE_BASE_URL }}
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          OPENAI_DEFAULT_API_KEY: ${{ secrets.OPENAI_DEFAULT_API_KEY }}
        run: |
          python3 <<'PY'
          import json
          import os

          defaults = {
              "SUPABASE_URL": "https://example.supabase.co",
              "SUPABASE_ANON_KEY": "example-anon-key",
              "TURNSTILE_SITE_KEY": "example-turnstile-site-key",
              "TURNSTILE_BASE_URL": "http://localhost/",
              "FIREBASE_API_KEY": "example-firebase-api-key",
              "FIREBASE_APP_ID": "1:000000000000:ios:example",
              "FIREBASE_MESSAGING_SENDER_ID": "000000000000",
              "FIREBASE_PROJECT_ID": "example-firebase-project",
          }

          for key in defaults:
              value = os.environ.get(key, "").strip()
              if value:
                  defaults[key] = value

          optional = os.environ.get("OPENAI_DEFAULT_API_KEY", "").strip()
          if optional:
              defaults["OPENAI_DEFAULT_API_KEY"] = optional

          with open("dart_defines.json", "w", encoding="utf-8") as handle:
              json.dump(defaults, handle, indent=2)
              handle.write("\n")
          PY

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (unsigned)
        run: |
          flutter build ios \
            --release \
            --no-codesign \
            --dart-define-from-file=dart_defines.json

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: fitforge-ios-${{ github.run_number }}
          path: |
            build/ios/iphoneos/Runner.app
            build/ios/archive/**
          if-no-files-found: warn
          retention-days: 14
